<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪲 Aisyah's 3D Beetle World - Realistic Ecosystem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            overflow: hidden;
            color: white;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100vh;
        }

        /* UI Panel */
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 20px;
            z-index: 100;
            min-width: 280px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            animation: panelFadeIn 0.8s ease-out;
        }

        @keyframes panelFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ui-panel h2 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.3em;
            text-shadow: 0 0 10px #00ff88;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 5px;
            border-left: 3px solid #00ff88;
        }

        .stat-label {
            color: #00ff88;
            font-weight: bold;
        }

        .stat-value {
            color: #00ffff;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00ffff);
            color: #0a0e27;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9em;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.8);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Header */
        .header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
            animation: headerSlideIn 0.8s ease-out;
        }

        @keyframes headerSlideIn {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .header h1 {
            font-size: 2em;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .header h1:hover {
            color: #ff6b9d;
            text-shadow: 0 0 30px #ff6b9d;
            transform: scale(1.05);
        }

        .header p {
            color: #00ffff;
            font-size: 0.9em;
            text-shadow: 0 0 10px #00ffff;
        }

        /* Message Button */
        .message-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b9d, #ffd700);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            z-index: 100;
            font-size: 1em;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.6);
            animation: messageBtnPulse 2s ease-in-out infinite;
        }

        @keyframes messageBtnPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .message-btn:hover {
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.9);
        }

        /* Love Message Modal */
        .love-message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .love-message-box {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.1), rgba(0, 255, 200, 0.1));
            border: 3px solid #00ff88;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.5);
            animation: scaleIn 0.6s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .love-message-box h2 {
            color: #ff6b9d;
            font-size: 2em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px #ff6b9d;
        }

        .love-message-box .from {
            color: #00ffff;
            font-size: 1.1em;
            margin-bottom: 15px;
            text-shadow: 0 0 10px #00ffff;
        }

        .love-message-box p {
            color: #fff;
            font-size: 1.3em;
            line-height: 1.8;
            margin: 20px 0;
            text-shadow: 0 0 10px rgba(255, 107, 157, 0.5);
        }

        .close-message-btn {
            background: linear-gradient(135deg, #00ff88, #00ffff);
            color: #0a0e27;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            font-size: 1em;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        .close-message-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.8);
        }

        /* Info Panel */
        .info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.95);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px;
            z-index: 100;
            max-width: 300px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            animation: infoPanelSlideIn 0.8s ease-out;
        }

        @keyframes infoPanelSlideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .info-panel h3 {
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }

        .control-info {
            font-size: 0.85em;
            color: #00ff88;
            margin: 8px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .ui-panel {
                bottom: 10px;
                left: 10px;
                min-width: 250px;
                padding: 15px;
            }

            .info-panel {
                top: 10px;
                right: 10px;
                max-width: 250px;
            }

            .message-btn {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- Header -->
    <div class="header" onclick="showLoveMessage()">
        <h1>🪲 Aisyah's 3D Beetle World</h1>
        <p>Realistic 3D Ecosystem Simulator</p>
    </div>

    <!-- Message Button -->
    <button class="message-btn" onclick="showLoveMessage()">💌 Baca Pesan</button>

    <!-- Love Message Modal -->
    <div class="love-message-overlay" id="loveMessageOverlay">
        <div class="love-message-box">
            <h2>💝 Pesan Untukmu</h2>
            <div class="from">Dari: Pandji ❤️</div>
            <p>"Tetap jadi wanita cantik ku ya sayang"</p>
            <p style="font-size: 1.2em; margin-top: 30px;">💕 Forever yours 💕</p>
            <button class="close-message-btn" onclick="closeLoveMessage()">Tutup ✨</button>
        </div>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <h3>🎮 Controls</h3>
        <div class="control-info">🖱️ Drag = Rotate</div>
        <div class="control-info">🔍 Scroll = Zoom</div>
        <div class="control-info">🎯 Click = Follow</div>
        <div class="control-info">⏸️ P = Pause</div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel">
        <h2>📊 Statistics</h2>
        <div class="stat-item">
            <span class="stat-label">🪲 Beetles:</span>
            <span class="stat-value" id="beetleCount">50</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🐦 Birds:</span>
            <span class="stat-value" id="birdCount">10</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🌿 Plants:</span>
            <span class="stat-value" id="plantCount">30</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">⏱️ Time:</span>
            <span class="stat-value" id="time">0s</span>
        </div>
        <div class="controls">
            <button onclick="togglePause()">⏸ Pause</button>
            <button onclick="resetSimulation()">🔄 Reset</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene Setup
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0e27);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;

        camera.position.set(0, 50, 50);
        camera.lookAt(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(100, 100, 50);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        directionalLight.shadow.camera.far = 500;
        scene.add(directionalLight);

        // Aurora Lights
        const auroraLight1 = new THREE.PointLight(0x00ff88, 0.3, 200);
        auroraLight1.position.set(100, 100, 0);
        scene.add(auroraLight1);

        const auroraLight2 = new THREE.PointLight(0x00ffff, 0.3, 200);
        auroraLight2.position.set(-100, 100, 0);
        scene.add(auroraLight2);

        // Fog
        scene.fog = new THREE.Fog(0x0a0e27, 200, 500);

        // Aurora Sky
        const skyGeometry = new THREE.SphereGeometry(400, 32, 32);
        const skyMaterial = new THREE.MeshBasicMaterial({
            color: 0x0a0e27,
            side: THREE.BackSide
        });
        const sky = new THREE.Mesh(skyGeometry, skyMaterial);
        scene.add(sky);

        // Stars
        const starsGeometry = new THREE.BufferGeometry();
        const starPositions = new Float32Array(1000 * 3);
        for (let i = 0; i < starPositions.length; i += 3) {
            starPositions[i] = (Math.random() - 0.5) * 800;
            starPositions[i + 1] = (Math.random() - 0.5) * 800;
            starPositions[i + 2] = (Math.random() - 0.5) * 800;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 2 });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Ground
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Camera Controls
        let cameraRotation = { x: 0, y: 0 };
        let cameraDistance = 80;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        document.addEventListener('mousedown', (e) => { isDragging = true; previousMousePosition = { x: e.clientX, y: e.clientY }; });
        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                cameraRotation.y += deltaX * 0.005;
                cameraRotation.x += deltaY * 0.005;
                cameraRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, cameraRotation.x));
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
        });
        document.addEventListener('mouseup', () => { isDragging = false; });
        document.addEventListener('wheel', (e) => {
            e.preventDefault();
            cameraDistance += e.deltaY * 0.05;
            cameraDistance = Math.max(30, Math.min(200, cameraDistance));
        });

        // Beetle Class
        class Beetle {
            constructor() {
                this.position = new THREE.Vector3((Math.random() - 0.5) * 100, 0.5, (Math.random() - 0.5) * 100);
                this.velocity = new THREE.Vector3((Math.random() - 0.5) * 2, 0, (Math.random() - 0.5) * 2);
                this.energy = 100;
                this.age = 0;
                this.direction = Math.random() * Math.PI * 2;
                
                // Create beetle mesh
                this.group = new THREE.Group();
                
                // Body
                const bodyGeometry = new THREE.CapsuleGeometry(0.3, 1, 4, 8);
                const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xff6b9d, metalness: 0.3, roughness: 0.4 });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.body.castShadow = true;
                this.body.receiveShadow = true;
                this.group.add(this.body);

                // Head
                const headGeometry = new THREE.SphereGeometry(0.25, 16, 16);
                const headMaterial = new THREE.MeshStandardMaterial({ color: 0xff5588, metalness: 0.4, roughness: 0.3 });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.z = 0.6;
                this.head.castShadow = true;
                this.head.receiveShadow = true;
                this.group.add(this.head);

                // Antenna
                const antennaGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 8);
                const antennaMaterial = new THREE.MeshStandardMaterial({ color: 0xff6b9d });
                const antenna1 = new THREE.Mesh(antennaGeometry, antennaMaterial);
                antenna1.position.set(-0.2, 0.1, 0.8);
                antenna1.rotation.x = 0.3;
                this.group.add(antenna1);

                const antenna2 = new THREE.Mesh(antennaGeometry, antennaMaterial);
                antenna2.position.set(0.2, 0.1, 0.8);
                antenna2.rotation.x = 0.3;
                this.group.add(antenna2);

                // Legs
                for (let i = 0; i < 3; i++) {
                    const legGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 8);
                    const legMaterial = new THREE.MeshStandardMaterial({ color: 0xff5588 });
                    const leg = new THREE.Mesh(legGeometry, legMaterial);
                    leg.position.set(-0.3, -0.3, -0.2 + i * 0.5);
                    leg.rotation.z = 0.5;
                    this.group.add(leg);

                    const leg2 = new THREE.Mesh(legGeometry, legMaterial);
                    leg2.position.set(0.3, -0.3, -0.2 + i * 0.5);
                    leg2.rotation.z = -0.5;
                    this.group.add(leg2);
                }

                this.group.position.copy(this.position);
                this.group.castShadow = true;
                scene.add(this.group);
            }

            update() {
                if (Math.random() < 0.02) {
                    this.direction += (Math.random() - 0.5) * 0.5;
                }

                this.velocity.x = Math.cos(this.direction) * 1.5;
                this.velocity.z = Math.sin(this.direction) * 1.5;

                this.position.add(this.velocity);
                this.energy -= 0.3;
                this.age++;

                // Wrap around
                if (this.position.x < -100) this.position.x = 100;
                if (this.position.x > 100) this.position.x = -100;
                if (this.position.z < -100) this.position.z = 100;
                if (this.position.z > 100) this.position.z = -100;

                this.group.position.copy(this.position);
                this.group.rotation.y = this.direction;
            }

            isAlive() {
                return this.energy > 0 && this.age < 10000;
            }

            remove() {
                scene.remove(this.group);
            }
        }

        // Bird Class
        class Bird {
            constructor() {
                this.position = new THREE.Vector3((Math.random() - 0.5) * 100, 30 + Math.random() * 40, (Math.random() - 0.5) * 100);
                this.velocity = new THREE.Vector3((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 1, (Math.random() - 0.5) * 3);
                this.energy = 150;
                this.age = 0;
                this.direction = Math.random() * Math.PI * 2;
                
                this.group = new THREE.Group();

                // Body
                const bodyGeometry = new THREE.ConeGeometry(0.4, 1.5, 16);
                const bodyMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.2, roughness: 0.5 });
                this.body = new THREE.Mesh(bodyGeometry, bodyMaterial);
                this.body.castShadow = true;
                this.body.receiveShadow = true;
                this.group.add(this.body);

                // Head
                const headGeometry = new THREE.SphereGeometry(0.35, 16, 16);
                const headMaterial = new THREE.MeshStandardMaterial({ color: 0xffed4e, metalness: 0.3, roughness: 0.4 });
                this.head = new THREE.Mesh(headGeometry, headMaterial);
                this.head.position.z = 0.8;
                this.head.castShadow = true;
                this.group.add(this.head);

                // Eyes
                const eyeGeometry = new THREE.SphereGeometry(0.1, 8, 8);
                const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const eye1 = new THREE.Mesh(eyeGeometry, eyeMaterial);
                eye1.position.set(-0.15, 0.15, 1.1);
                this.group.add(eye1);

                const eye2 = new THREE.Mesh(eyeGeometry, eyeMaterial);
                eye2.position.set(0.15, 0.15, 1.1);
                this.group.add(eye2);

                // Beak
                const beakGeometry = new THREE.ConeGeometry(0.1, 0.4, 8);
                const beakMaterial = new THREE.MeshStandardMaterial({ color: 0xff8800 });
                const beak = new THREE.Mesh(beakGeometry, beakMaterial);
                beak.position.z = 1.2;
                beak.rotation.x = Math.PI / 2;
                this.group.add(beak);

                // Wings
                const wingGeometry = new THREE.BoxGeometry(0.8, 0.2, 1.2);
                const wingMaterial = new THREE.MeshStandardMaterial({ color: 0xffb700, metalness: 0.2 });
                const wing1 = new THREE.Mesh(wingGeometry, wingMaterial);
                wing1.position.set(-0.5, 0, 0);
                wing1.castShadow = true;
                this.group.add(wing1);

                const wing2 = new THREE.Mesh(wingGeometry, wingMaterial);
                wing2.position.set(0.5, 0, 0);
                wing2.castShadow = true;
                this.group.add(wing2);

                this.group.position.copy(this.position);
                this.group.castShadow = true;
                scene.add(this.group);
            }

            update() {
                if (Math.random() < 0.03) {
                    this.direction += (Math.random() - 0.5) * 0.3;
                    this.velocity.y += (Math.random() - 0.5) * 0.5;
                }

                this.velocity.x = Math.cos(this.direction) * 2.5;
                this.velocity.z = Math.sin(this.direction) * 2.5;
                this.velocity.y = Math.max(-2, Math.min(2, this.velocity.y));

                this.position.add(this.velocity);
                this.energy -= 0.5;
                this.age++;

                // Keep in bounds
                if (this.position.y < 20) this.position.y = 20;
                if (this.position.y > 80) this.position.y = 80;
                if (this.position.x < -100) this.position.x = 100;
                if (this.position.x > 100) this.position.x = -100;
                if (this.position.z < -100) this.position.z = 100;
                if (this.position.z > 100) this.position.z = -100;

                this.group.position.copy(this.position);
                this.group.rotation.y = this.direction;
            }

            isAlive() {
                return this.energy > 0 && this.age < 10000;
            }

            remove() {
                scene.remove(this.group);
            }
        }

        // Plant Class
        class Plant {
            constructor() {
                this.position = new THREE.Vector3((Math.random() - 0.5) * 100, 0, (Math.random() - 0.5) * 100);
                
                this.group = new THREE.Group();

                // Stem
                const stemGeometry = new THREE.CylinderGeometry(0.1, 0.15, 1.5, 8);
                const stemMaterial = new THREE.MeshStandardMaterial({ color: 0x4ade80, roughness: 0.7 });
                const stem = new THREE.Mesh(stemGeometry, stemMaterial);
                stem.castShadow = true;
                stem.receiveShadow = true;
                this.group.add(stem);

                // Leaves
                for (let i = 0; i < 5; i++) {
                    const leafGeometry = new THREE.BoxGeometry(0.4, 0.1, 0.8);
                    const leafMaterial = new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 0.8 });
                    const leaf = new THREE.Mesh(leafGeometry, leafMaterial);
                    leaf.position.y = -0.3 + i * 0.3;
                    leaf.rotation.x = Math.random() * 0.5 - 0.25;
                    leaf.rotation.z = Math.random() * Math.PI * 2;
                    leaf.castShadow = true;
                    this.group.add(leaf);
                }

                // Flower
                const flowerGeometry = new THREE.SphereGeometry(0.3, 16, 16);
                const flowerMaterial = new THREE.MeshStandardMaterial({ color: 0xff6b9d, emissive: 0xff6b9d, emissiveIntensity: 0.2 });
                const flower = new THREE.Mesh(flowerGeometry, flowerMaterial);
                flower.position.y = 0.8;
                flower.castShadow = true;
                this.group.add(flower);

                this.group.position.copy(this.position);
                scene.add(this.group);
            }

            remove() {
                scene.remove(this.group);
            }
        }

        // Simulation
        let beetles = [];
        let birds = [];
        let plants = [];
        let simulationTime = 0;
        let isPaused = false;
        let followTarget = null;

        function initialize() {
            for (let i = 0; i < 50; i++) {
                beetles.push(new Beetle());
            }
            for (let i = 0; i < 10; i++) {
                birds.push(new Bird());
            }
            for (let i = 0; i < 30; i++) {
                plants.push(new Plant());
            }
        }

        function update() {
            if (isPaused) return;

            simulationTime++;

            beetles.forEach(beetle => beetle.update());
            birds.forEach(bird => bird.update());

            beetles = beetles.filter(b => {
                if (!b.isAlive()) {
                    b.remove();
                    return false;
                }
                return true;
            });

            birds = birds.filter(b => {
                if (!b.isAlive()) {
                    b.remove();
                    return false;
                }
                return true;
            });

            updateUI();
        }

        function updateUI() {
            document.getElementById('beetleCount').textContent = beetles.length;
            document.getElementById('birdCount').textContent = birds.length;
            document.getElementById('plantCount').textContent = plants.length;
            document.getElementById('time').textContent = Math.floor(simulationTime / 60) + 's';
        }

        function togglePause() {
            isPaused = !isPaused;
        }

        function resetSimulation() {
            beetles.forEach(b => b.remove());
            birds.forEach(b => b.remove());
            plants.forEach(p => p.remove());
            beetles = [];
            birds = [];
            plants = [];
            simulationTime = 0;
            initialize();
        }

        function showLoveMessage() {
            document.getElementById('loveMessageOverlay').style.display = 'flex';
        }

        function closeLoveMessage() {
            document.getElementById('loveMessageOverlay').style.display = 'none';
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (e.key === 'p' || e.key === 'P') togglePause();
        });

        // Canvas click for following
        canvas.addEventListener('click', (event) => {
            if (event.target === canvas) {
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);

                const beetleObjects = beetles.map(b => b.body);
                const birdObjects = birds.map(b => b.body);
                const intersects = raycaster.intersectObjects([...beetleObjects, ...birdObjects]);

                if (intersects.length > 0) {
                    const clicked = intersects[0].object.parent;
                    followTarget = clicked;
                }
            }
        });

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            update();

            // Update camera position
            const angle = Math.atan2(camera.position.x, camera.position.z);
            camera.position.x = Math.sin(cameraRotation.y) * Math.cos(cameraRotation.x) * cameraDistance;
            camera.position.y = Math.sin(cameraRotation.x) * cameraDistance + 20;
            camera.position.z = Math.cos(cameraRotation.y) * Math.cos(cameraRotation.x) * cameraDistance;
            
            if (followTarget) {
                camera.lookAt(followTarget.position);
            } else {
                camera.lookAt(0, 10, 0);
            }

            // Animate aurora lights
            auroraLight1.position.x = Math.sin(simulationTime * 0.005) * 150;
            auroraLight2.position.x = Math.cos(simulationTime * 0.005) * 150;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initialize();
        animate();
    </script>
</body>
</html>
