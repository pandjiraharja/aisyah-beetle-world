<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪲 Aisyah's Beetle World - Aurora Ecosystem Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e27;
            overflow: hidden;
            color: white;
        }

        /* Aurora Background */
        .aurora-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.1), transparent 50%),
                        radial-gradient(ellipse at 0% 50%, rgba(0, 136, 255, 0.1), transparent 50%),
                        radial-gradient(ellipse at 100% 50%, rgba(136, 0, 255, 0.1), transparent 50%);
            animation: auroraShift 8s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes auroraShift {
            0%, 100% {
                background: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, 0.1), transparent 50%),
                            radial-gradient(ellipse at 0% 50%, rgba(0, 136, 255, 0.1), transparent 50%),
                            radial-gradient(ellipse at 100% 50%, rgba(136, 0, 255, 0.1), transparent 50%);
            }
            50% {
                background: radial-gradient(ellipse at 50% 0%, rgba(0, 200, 255, 0.15), transparent 50%),
                            radial-gradient(ellipse at 0% 50%, rgba(100, 200, 255, 0.15), transparent 50%),
                            radial-gradient(ellipse at 100% 50%, rgba(0, 255, 200, 0.15), transparent 50%);
            }
        }

        /* Stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Canvas Container */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 3;
            display: block;
        }

        /* UI Panel */
        .ui-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(10, 14, 39, 0.9);
            border: 2px solid #00ff88;
            border-radius: 15px;
            padding: 20px;
            z-index: 100;
            min-width: 280px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            animation: panelFadeIn 0.8s ease-out;
        }

        @keyframes panelFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ui-panel h2 {
            color: #00ff88;
            margin-bottom: 15px;
            font-size: 1.3em;
            text-shadow: 0 0 10px #00ff88;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 5px;
            border-left: 3px solid #00ff88;
            animation: statGlow 2s ease-in-out infinite;
        }

        @keyframes statGlow {
            0%, 100% { box-shadow: inset 0 0 5px rgba(0, 255, 136, 0.2); }
            50% { box-shadow: inset 0 0 10px rgba(0, 255, 136, 0.4); }
        }

        .stat-label {
            color: #00ff88;
            font-weight: bold;
        }

        .stat-value {
            color: #00ffff;
            font-weight: bold;
        }

        /* Control Buttons */
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00ffff);
            color: #0a0e27;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.9em;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.8);
        }

        button:active {
            transform: scale(0.95);
        }

        /* Header */
        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            z-index: 100;
            animation: headerSlideIn 0.8s ease-out;
        }

        @keyframes headerSlideIn {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .header h1 {
            font-size: 2em;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin-bottom: 5px;
        }

        .header p {
            color: #00ffff;
            font-size: 0.9em;
            text-shadow: 0 0 10px #00ffff;
        }

        /* Info Panel */
        .info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 14, 39, 0.9);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px;
            z-index: 100;
            max-width: 300px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            animation: infoPanelSlideIn 0.8s ease-out;
        }

        @keyframes infoPanelSlideIn {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .info-panel h3 {
            color: #00ffff;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00ffff;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            font-size: 0.9em;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            box-shadow: 0 0 10px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5em;
            }

            .ui-panel {
                bottom: 10px;
                left: 10px;
                min-width: 250px;
                padding: 15px;
            }

            .info-panel {
                top: 10px;
                right: 10px;
                max-width: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- Aurora Background -->
    <div class="aurora-bg"></div>
    
    <!-- Stars -->
    <div class="stars" id="stars"></div>

    <!-- Canvas -->
    <canvas id="canvas"></canvas>

    <!-- Header -->
    <div class="header">
        <h1>🪲 Aisyah's Beetle World</h1>
        <p>Aurora Ecosystem Simulator</p>
    </div>

    <!-- Info Panel -->
    <div class="info-panel">
        <h3>🌍 Ecosystem Info</h3>
        <div class="legend-item">
            <div class="legend-color" style="background: #ff6b9d; box-shadow: 0 0 10px #ff6b9d;"></div>
            <span>Leaf Beetle (Herbivore)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #ffd700; box-shadow: 0 0 10px #ffd700;"></div>
            <span>Stag Beetle (Carnivore)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #00ff88; box-shadow: 0 0 10px #00ff88;"></div>
            <span>Food</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #4ade80; box-shadow: 0 0 10px #4ade80;"></div>
            <span>Plant</span>
        </div>
    </div>

    <!-- UI Panel -->
    <div class="ui-panel">
        <h2>📊 Statistics</h2>
        <div class="stat-item">
            <span class="stat-label">🪲 Total Beetles:</span>
            <span class="stat-value" id="totalBeetles">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🍃 Herbivores:</span>
            <span class="stat-value" id="herbivores">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🦅 Carnivores:</span>
            <span class="stat-value" id="carnivores">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">🌿 Generation:</span>
            <span class="stat-value" id="generation">1</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">⏱️ Time:</span>
            <span class="stat-value" id="time">0s</span>
        </div>
        <div class="controls">
            <button onclick="addBeetles('herbivore', 5)">+ Herbivore</button>
            <button onclick="addBeetles('carnivore', 3)">+ Carnivore</button>
            <button onclick="togglePause()">⏸ Pause</button>
            <button onclick="resetSimulation()">🔄 Reset</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let isPaused = false;
        let simulationTime = 0;
        let generation = 1;

        // Generate Stars
        function generateStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }

        // Beetle Class
        class Beetle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'herbivore' or 'carnivore'
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.energy = 100;
                this.age = 0;
                this.size = type === 'herbivore' ? 6 : 8;
                this.color = type === 'herbivore' ? '#ff6b9d' : '#ffd700';
                this.direction = Math.random() * Math.PI * 2;
            }

            update() {
                // Movement with random direction changes
                if (Math.random() < 0.02) {
                    this.direction += (Math.random() - 0.5) * 0.5;
                }

                this.vx = Math.cos(this.direction) * 2;
                this.vy = Math.sin(this.direction) * 2;

                this.x += this.vx;
                this.y += this.vy;

                // Wrap around screen
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;

                // Energy consumption
                this.energy -= this.type === 'carnivore' ? 0.5 : 0.3;
                this.age++;
            }

            draw() {
                // Glow effect
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();

                // Antenna
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size);
                ctx.lineTo(this.x - 4, this.y - this.size - 8);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size);
                ctx.lineTo(this.x + 4, this.y - this.size - 8);
                ctx.stroke();

                ctx.shadowBlur = 0;
            }

            isAlive() {
                return this.energy > 0 && this.age < 5000;
            }
        }

        // Food Class
        class Food {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 4;
                this.color = '#00ff88';
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Plant Class
        class Plant {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 8;
                this.color = '#4ade80';
                this.energy = 50;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                
                // Draw plant as star
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const angle = (i * 4 * Math.PI) / 5;
                    const x = this.x + Math.cos(angle) * this.size;
                    const y = this.y + Math.sin(angle) * this.size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Particle System
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 1;
                this.color = color;
                this.alpha = 1;
                this.life = 30;
                this.maxLife = 30;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // gravity
                this.alpha = this.life / this.maxLife;
                this.life--;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }

            isAlive() {
                return this.life > 0;
            }
        }

        // Global entities
        let beetles = [];
        let food = [];
        let plants = [];
        let particles = [];

        // Initialize
        function initialize() {
            generateStars();
            
            // Add initial beetles
            for (let i = 0; i < 10; i++) {
                beetles.push(new Beetle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    Math.random() > 0.6 ? 'carnivore' : 'herbivore'
                ));
            }

            // Add initial plants
            for (let i = 0; i < 15; i++) {
                plants.push(new Plant(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }

            // Add initial food
            for (let i = 0; i < 20; i++) {
                food.push(new Food(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }
        }

        // Add beetles manually
        function addBeetles(type, count) {
            for (let i = 0; i < count; i++) {
                beetles.push(new Beetle(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height,
                    type
                ));
                createParticles(Math.random() * canvas.width, Math.random() * canvas.height, '#00ff88', 10);
            }
        }

        // Create particles
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Toggle pause
        function togglePause() {
            isPaused = !isPaused;
        }

        // Reset simulation
        function resetSimulation() {
            beetles = [];
            food = [];
            plants = [];
            particles = [];
            simulationTime = 0;
            generation = 1;
            initialize();
        }

        // Update simulation
        function update() {
            if (isPaused) return;

            simulationTime++;

            // Update beetles
            for (let i = beetles.length - 1; i >= 0; i--) {
                beetles[i].update();

                // Check collision with food
                for (let j = food.length - 1; j >= 0; j--) {
                    const dx = beetles[i].x - food[j].x;
                    const dy = beetles[i].y - food[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < beetles[i].size + food[j].size) {
                        beetles[i].energy += 30;
                        createParticles(food[j].x, food[j].y, '#00ff88', 8);
                        food.splice(j, 1);
                        break;
                    }
                }

                // Herbivores eat plants
                if (beetles[i].type === 'herbivore') {
                    for (let j = plants.length - 1; j >= 0; j--) {
                        const dx = beetles[i].x - plants[j].x;
                        const dy = beetles[i].y - plants[j].y;
                        const distance = Math.sqrt(dx * dx + dy * dy);

                        if (distance < beetles[i].size + plants[j].size) {
                            beetles[i].energy += 20;
                            createParticles(plants[j].x, plants[j].y, '#4ade80', 10);
                            plants.splice(j, 1);

                            // Regenerate plant
                            setTimeout(() => {
                                plants.push(new Plant(
                                    Math.random() * canvas.width,
                                    Math.random() * canvas.height
                                ));
                            }, 2000);
                            break;
                        }
                    }
                }

                // Carnivores hunt herbivores
                if (beetles[i].type === 'carnivore') {
                    for (let j = beetles.length - 1; j >= 0; j--) {
                        if (j !== i && beetles[j].type === 'herbivore') {
                            const dx = beetles[i].x - beetles[j].x;
                            const dy = beetles[i].y - beetles[j].y;
                            const distance = Math.sqrt(dx * dx + dy * dy);

                            if (distance < beetles[i].size + beetles[j].size + 10) {
                                beetles[i].energy += 50;
                                createParticles(beetles[j].x, beetles[j].y, '#ff6b9d', 15);
                                beetles.splice(j, 1);
                                break;
                            }
                        }
                    }
                }

                // Beetle reproduction
                if (beetles[i].energy > 150 && Math.random() < 0.01) {
                    beetles.push(new Beetle(
                        beetles[i].x + (Math.random() - 0.5) * 20,
                        beetles[i].y + (Math.random() - 0.5) * 20,
                        beetles[i].type
                    ));
                    createParticles(beetles[i].x, beetles[i].y, beetles[i].color, 5);
                    beetles[i].energy -= 50;
                    generation++;
                }

                // Remove dead beetles
                if (!beetles[i].isAlive()) {
                    createParticles(beetles[i].x, beetles[i].y, '#ff0000', 10);
                    beetles.splice(i, 1);
                }
            }

            // Update particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (!particles[i].isAlive()) {
                    particles.splice(i, 1);
                }
            }

            // Add random food
            if (Math.random() < 0.05 && food.length < 30) {
                food.push(new Food(
                    Math.random() * canvas.width,
                    Math.random() * canvas.height
                ));
            }

            // Update UI
            updateUI();
        }

        // Update UI
        function updateUI() {
            const herbivoreCount = beetles.filter(b => b.type === 'herbivore').length;
            const carnivoreCount = beetles.filter(b => b.type === 'carnivore').length;

            document.getElementById('totalBeetles').textContent = beetles.length;
            document.getElementById('herbivores').textContent = herbivoreCount;
            document.getElementById('carnivores').textContent = carnivoreCount;
            document.getElementById('generation').textContent = generation;
            document.getElementById('time').textContent = Math.floor(simulationTime / 60) + 's';
        }

        // Draw
        function draw() {
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw plants
            plants.forEach(plant => plant.draw());

            // Draw food
            food.forEach(f => f.draw());

            // Draw beetles
            beetles.forEach(beetle => beetle.draw());

            // Draw particles
            particles.forEach(particle => particle.draw());
        }

        // Animation loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Start
        initialize();
        gameLoop();
    </script>
</body>
</html>
